<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
</head>
<body>
    <h1 id="heading">
    
    </h1>
    
    <script> 
        function update(){
            let hours,mins,seconds;
            let timer=new Date();
            hours=timer.getHours();
            mins=timer.getMinutes();
            seconds=timer.getSeconds();
            document.getElementById("heading").innerText=`${hours}:${mins}:${seconds}`;
          
        }
          setInterval(update,1000);
        
    </script>
</body>
</html>
